<!DOCTYPE html>
<html>
<head>
  <title>Important Question 💘</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #ffdde1;
    }
    h1 {
      margin-top: 100px;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #yes {
      background-color: #ff4d6d;
      color: white;
    }
    #no {
      background-color: gray;
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>Will you be my Valentine? 💖</h1>

  <button id="yes" onclick="yesClick()">YES 😍</button>
  <button id="no" onmouseover="moveButton()">NO 😭</button>

  <script>
    function yesClick() {
      document.body.innerHTML = "<h1>YAYYY 💕 I knew it 😎</h1>";
    }

    function moveButton() {
      var x = Math.random() * window.innerWidth;
      var y = Math.random() * window.innerHeight;
      document.getElementById('no').style.left = x + 'px';
      document.getElementById('no').style.top = y + 'px';
    }
  </script>

</body>
</html>
